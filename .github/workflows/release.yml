name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish: 1.0.0'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: false
        type: choice
        default: latest
        options:
          - latest
          - next
          - beta
      dry-run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run build
        run: pnpm run build

  release:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version
        run: pnpm pkg set version=${{ inputs.version }}

      - name: Build
        run: pnpm run build

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry-run }}
        run: pnpm publish --tag ${{ inputs.tag }} --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: pnpm publish --tag ${{ inputs.tag }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        run: gh release create "v${{ inputs.version }}" --generate-notes --title "v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
